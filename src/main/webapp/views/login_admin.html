<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Spa Relax</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <h2>Acceso Administrativo</h2>
        <form class="admin-login-form" id="adminLoginForm" onsubmit="return validateAdminLogin(event)">
            <div class="form-group">
                <label for="admin-email">Correo electrónico</label>
                <input type="email" id="admin-email" placeholder="admin@email.com" required>
            </div>
            <div class="form-group">
                <label for="admin-password">Contraseña</label>
                <input type="password" id="admin-password" placeholder="Ingresa tu contraseña" required>
            </div>
            <div class="error-message" id="adminLoginError" style="display: none; color: #ff6b6b; margin-bottom: 10px; text-align: center;"></div>
            <button type="submit" class="btn-login">Iniciar Sesión</button>
        </form>
        <div class="extra-links">
            <p><a href="index.html">Volver al inicio</a></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
