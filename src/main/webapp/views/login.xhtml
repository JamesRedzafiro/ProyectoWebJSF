<!DOCTYPE html>
<html lang="es" xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Spa Relax</title>
  <link rel="stylesheet" href="#{request.contextPath}/assets/css/styles.css"/>
</head>
<body>
  <header class="header">
    <h1>Spa Relax</h1>
    <nav class="nav">
      <a href="index.xhtml" >Inicio</a>
      <a href="login.xhtml" class="active">Iniciar Sesión</a>
      <a href="login_admin.html">Admin</a>
    </nav>
  </header>

  <div class="login-container">
    <h2>Bienvenido a Spa Relax</h2>

    <h:form id="loginForm">
      <div class="form-group">
        <h:outputLabel for="email" value="Correo Electrónico"/>
        <h:inputText id="email" value="#{loginBean.email}" required="true" />
      </div>

      <div class="form-group">
        <h:outputLabel for="password" value="Contraseña"/>
        <h:inputSecret id="password" value="#{loginBean.password}" required="true"/>
      </div>

      <div class="error-message" style="color: #ff6b6b; margin-bottom: 10px; text-align: center;">
        <h:messages globalOnly="true" layout="list"/>
      </div>

      <div style="margin-top: 12px;">
        <h:commandButton value="Iniciar Sesión" action="#{loginBean.login}" styleClass="btn-login"/>
      </div>
    </h:form>

    <div class="extra-links">
      <p>¿No tienes cuenta? <h:link outcome="registro" value="Regístrate"/></p>
      <p><a href="#">¿Olvidaste tu contraseña?</a></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
