<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="es">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - Spa Relax</title>

    <link rel="stylesheet" href="#{request.contextPath}/assets/css/styles.css" />
</head>
<body>
    <div class="login-container">
        <h2>Acceso Administrativo</h2>

        <form class="admin-login-form" id="adminLoginForm">
            <div class="form-group">
                <label for="admin-email">Correo electrónico</label>
                <input type="email" id="admin-email" placeholder="admin@email.com" required="required" />
            </div>

            <div class="form-group">
                <label for="admin-password">Contraseña</label>
                <input type="password" id="admin-password" placeholder="Ingresa tu contraseña" required="required" />
            </div>

            <div class="error-message" id="adminLoginError"
                 style="display:none; color:#ff6b6b; margin-bottom:10px; text-align:center;">
            </div>

            <button type="submit" class="btn-login">Iniciar Sesión</button>
        </form>

        <div class="extra-links">
            <p>
                <a href="#{request.contextPath}/views/index.xhtml">Volver al inicio</a>
            </p>
        </div>
    </div>

    <script src="#{request.contextPath}/assets/js/script.js"></script>
</body>
</html>
