<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario - Spa Relax</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <h2>Crear Cuenta en Spa Relax</h2>
    <form class="registration-form" onsubmit="return validateRegister(event)">
            <div class="form-group">
                <label for="dni">DNI*</label>
                <input type="text" id="dni" pattern="[0-9]{8}" maxlength="8" placeholder="Ingresa tu DNI" required>
                <small class="form-help">DNI debe tener 8 dígitos</small>
            </div>

            <div class="form-group">
                <label for="nombre">Nombre Completo*</label>
                <input type="text" id="nombre" placeholder="Ingresa tu nombre completo" required>
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico*</label>
                <input type="email" id="email" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="form-group">
                <label for="telefono">Teléfono*</label>
                <input type="tel" id="telefono" pattern="[0-9]{9}" maxlength="9" placeholder="Ingresa tu número" required>
                <small class="form-help">Teléfono debe tener 9 dígitos</small>
            </div>

            <div class="form-group">
                <label for="password">Contraseña*</label>
                <input type="password" id="password" placeholder="Crea tu contraseña" required>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirmar Contraseña*</label>
                <input type="password" id="confirm-password" placeholder="Repite tu contraseña" required>
                <small class="form-help">Las contraseñas deben coincidir</small>
            </div>

            <button type="submit" class="btn-submit">Crear Cuenta</button>
    </form>
    <script src="script.js"></script>
        <div class="extra-links">
            <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
        </div>
    </div>
</body>
</html>
