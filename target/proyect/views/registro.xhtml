<!DOCTYPE html>
<html lang="es" xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro - Spa Relax</title>
  <link rel="stylesheet" href="#{request.contextPath}/assets/css/styles.css"/>
</head>
<body>
  <header class="header">
    <h1>Spa Relax</h1>
    <nav class="nav">
      <a href="index.xhtml">Inicio</a>
      <a href="login.xhtml" class="active">Iniciar Sesión</a>
      <a href="login_admin.html">Admin</a>
    </nav>
  </header>

  <div class="login-container">
    <h2>Crear Cuenta</h2>

    <h:form id="registroForm">
      <div class="form-group">
        <h:outputLabel for="nombre" value="Nombre completo"/>
        <h:inputText id="nombre" value="#{registroBean.nombre}" required="true"/>
      </div>

      <div class="form-group">
        <h:outputLabel for="correo" value="Correo electrónico"/>
        <h:inputText id="correo" value="#{registroBean.email}" required="true"/>
      </div>

      <div class="form-group">
        <h:outputLabel for="telefono" value="Teléfono"/>
        <h:inputText id="telefono" value="#{registroBean.telefono}" required="true"/>
      </div>

      <div class="form-group">
        <h:outputLabel for="password" value="Contraseña"/>
        <h:inputSecret id="password" value="#{registroBean.password}" required="true"/>
      </div>

      <div class="form-group">
        <h:outputLabel for="confirmar" value="Confirmar contraseña"/>
        <h:inputSecret id="confirmar" value="#{registroBean.passwordConfirm}" required="true"/>
      </div>

      <div style="margin-top: 12px;">
        <h:commandButton value="Registrarse" action="#{registroBean.registrar}" styleClass="btn-login"/>
      </div>
    </h:form>

    <div class="extra-links">
      <p>¿Ya tienes cuenta? <h:link outcome="login" value="Inicia sesión"/></p>
    </div>
  </div>

</body>
</html>
